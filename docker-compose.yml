version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: houseduty_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: houseduty
      POSTGRES_PASSWORD: houseduty_secret
      POSTGRES_DB: houseduty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: houseduty_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
