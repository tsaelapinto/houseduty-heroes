<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- House roof -->
  <polygon points="256,80 100,230 412,230" fill="white" opacity="0.95"/>
  <!-- House body -->
  <rect x="140" y="220" width="232" height="200" rx="10" fill="white" opacity="0.95"/>
  <!-- Door -->
  <rect x="210" y="280" width="92" height="140" rx="8" fill="url(#bg)"/>
  <!-- Door knob -->
  <circle cx="294" cy="352" r="8" fill="white" opacity="0.6"/>
  <!-- Windows -->
  <rect x="155" y="250" width="55" height="55" rx="6" fill="url(#bg)" opacity="0.7"/>
  <rect x="302" y="250" width="55" height="55" rx="6" fill="url(#bg)" opacity="0.7"/>
  <!-- Star -->
  <text x="256" y="130" font-size="40" text-anchor="middle" fill="#fbbf24">⭐</text>
</svg>
